syntax = "proto3";

option csharp_namespace = "DataProtectionTool.Contracts.Grpc";

package data_protection_tool.master;

// Master coordination service (extend with real RPCs later).
service MasterService {
  rpc Ping (PingRequest) returns (PingReply);
}

message PingRequest {
  string client_name = 1;
}

message PingReply {
  string message = 1;
  string server_utc_time_rfc3339 = 2;
}
